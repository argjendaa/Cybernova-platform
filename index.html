<!DOCTYPE html>
<!-- Tregon që dokumenti përdor HTML5 -->

<html lang="en">
<!-- Fillimi i dokumentit HTML
     lang="en" tregon që gjuha e faqes është anglisht -->

<head>
    <meta charset="UTF-8">
    <!-- Mbështet karaktere speciale dhe shkronja të ndryshme -->

    <title>CyberNova System</title>
    <!-- Titulli që shfaqet në tab të browser-it -->

    <link rel="stylesheet" href="style.css">
    <!-- Lidh fajllin CSS për dizajnin/stilimin e faqes -->
</head>

<body>
<!-- Pjesa kryesore e faqes që shfaqet te përdoruesi -->

<div class="container">
    <!-- Div kryesor që mban gjithë përmbajtjen -->

    <img src="library/logo(2).png" class="logo" alt="CyberNova Logo">
    <!-- Shfaq logon e sistemit
         src = lokacioni i fotos
         class="logo" përdoret për stilizim në CSS
         alt = tekst rezervë nëse foto nuk hapet -->

    <p>
        <strong>Platforma e Sigurisë kibernike për biznese të vogla.</strong>
    </p>
    <!-- Paragraf me tekst të trashë (bold) -->

    <div class="actions">
        <!-- Div që mban butonat -->

        <a href="login.html" class="btn">Kyçu</a>
        <!-- Buton/link për faqen e kyçjes
             href tregon ku dërgon linku -->

        <a href="register.php" class="btn">Regjistrohu</a>
        <!-- Buton/link për faqen e regjistrimit -->
    </div>

</div>

</body>
</html>
